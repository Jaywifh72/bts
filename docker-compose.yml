services:
  postgres:
    image: postgres:16
    container_name: bts-postgres
    environment:
      POSTGRES_USER: bts
      POSTGRES_PASSWORD: bts
      POSTGRES_DB: bts_dev
    ports:
      - "5432:5432"
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
      - ./scripts/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bts -d bts_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
