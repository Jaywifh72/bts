services:
  postgres:
    # E-26 — pgvector image is just postgres:16 with the `vector`
    # extension bundled. Bind-mounted data volume survives the swap.
    image: pgvector/pgvector:pg16
    container_name: bts-postgres
    environment:
      POSTGRES_USER: bts
      POSTGRES_PASSWORD: bts
      POSTGRES_DB: bts_dev
    ports:
      - "5432:5432"
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
      - ./scripts/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bts -d bts_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  scraper:
    build:
      context: .
      dockerfile: packages/scraper/Dockerfile
    environment:
      DATABASE_URL: postgres://bts:bts@postgres:5432/bts_dev
      SCRAPER_CRON: "0 3 * * 1"
      YOUTUBE_API_KEY: "${YOUTUBE_API_KEY:-}"
      VIMEO_ACCESS_TOKEN: "${VIMEO_ACCESS_TOKEN:-}"
    volumes:
      - ./packages/scraper/data:/app/packages/scraper/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - scraper
