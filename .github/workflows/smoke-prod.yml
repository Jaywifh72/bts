name: Smoke — production endpoints

# Hits the public production endpoints after a deploy to make sure nothing
# we shipped broke them. Runs on:
#   • Every push to master (post-merge)
#   • Every 6 hours (catches Vercel/Neon outages that aren't our deploy)
#   • Manual dispatch
#
# Opens a GH issue on failure via the same pattern as aeo-failure-alert.yml.

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Smoke each surface
        id: smoke
        run: |
          set +e  # do not abort on first failure; we want the full picture
          FAILURES=()

          check() {
            local label="$1" url="$2" expected_substr="$3"
            echo ""
            echo "::group::$label"
            echo "URL: $url"
            local body code
            body=$(curl -sL -o /tmp/body -w "%{http_code}" "$url")
            code=$?
            local httpcode=$body
            if [ "$code" -ne 0 ]; then
              echo "::error::curl failed for $label (exit $code)"
              FAILURES+=("$label: curl exit $code")
              echo "::endgroup::"
              return
            fi
            if [ "$httpcode" != "200" ]; then
              echo "::error::$label returned HTTP $httpcode"
              FAILURES+=("$label: HTTP $httpcode")
              echo "::endgroup::"
              return
            fi
            if [ -n "$expected_substr" ]; then
              if ! grep -q "$expected_substr" /tmp/body; then
                echo "::error::$label body missing expected substring '$expected_substr'"
                FAILURES+=("$label: missing '$expected_substr'")
                echo "::endgroup::"
                return
              fi
            fi
            echo "✓ $label OK"
            echo "::endgroup::"
          }

          check "API root"        "https://www.cinecanon.com/api/v1"                          '"name":"CineCanon API"'
          check "AEO precision"   "https://www.cinecanon.com/api/v1/aeo/precision"            '"metrics"'
          check "AEO claims"      "https://www.cinecanon.com/api/v1/aeo/claims?limit=1"       '"claims"'
          check "AEO digest"      "https://www.cinecanon.com/api/v1/aeo/digest.xml"           '<feed'
          check "llms.txt"        "https://www.cinecanon.com/llms.txt"                        'CineCanon'
          check "/films/the-brutalist-2024"  "https://www.cinecanon.com/films/the-brutalist-2024"  'The Brutalist'

          if [ ${#FAILURES[@]} -ne 0 ]; then
            echo ""
            echo "::error::Smoke failures: ${#FAILURES[@]}"
            for f in "${FAILURES[@]}"; do echo "  - $f"; done
            {
              echo "failures<<EOF"
              for f in "${FAILURES[@]}"; do echo "$f"; done
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "All endpoints OK."

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = '⚠️ Production smoke failing';
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'smoke-alert', per_page: 5,
            });
            const existing = open.find((i) => i.title === title);
            const body = [
              `**Run:** ${runUrl}`,
              `**Commit:** \`${sha}\``,
              `**Event:** \`${context.eventName}\``,
              ``,
              `One or more production endpoints returned non-200 or wrong body.`,
              ``,
              `### Where to look`,
              `1. Open the run above and read the per-step smoke output`,
              `2. Check Vercel: https://vercel.com/jeanjacquesboileau-2392s-projects/cinecanon`,
              `3. Check Neon prod connection`,
              `4. Hit each URL manually to confirm`,
            ].join('\n');
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['smoke-alert', 'ops'],
              });
            }

      - name: Auto-close on recovery
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '⚠️ Production smoke failing';
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'smoke-alert', per_page: 5,
            });
            const existing = open.find((i) => i.title === title);
            if (existing) {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number,
                body: `✅ Smoke recovered: ${runUrl}\n\nClosing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, state: 'closed',
              });
            }
