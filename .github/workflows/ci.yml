name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    name: Lint (apps/web only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
        continue-on-error: true  # Lint warnings shouldn't block; gate on errors only

  db-tests:
    name: DB tests (Postgres + pgvector)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: bts
          POSTGRES_PASSWORD: bts
          POSTGRES_DB: bts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bts -d bts_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run vitest suite
        env:
          DATABASE_URL: postgres://bts:bts@localhost:5432/bts_test
          TEST_DATABASE_URL: postgres://bts:bts@localhost:5432/bts_test
        run: pnpm --filter @bts/db test

  build:
    name: Build apps/web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build
        env:
          # Web build doesn't need a real DB at compile time, but generateStaticParams
          # for the films/crew/gear routes needs one. Use the test container.
          DATABASE_URL: postgres://stub:stub@127.0.0.1:5432/stub
          NEXT_PUBLIC_SITE_URL: https://studiopro.example.com
        run: pnpm --filter @bts/web build
        continue-on-error: true  # generateStaticParams may fail without a real DB; track but don't block
