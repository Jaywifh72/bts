name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel in-progress runs on the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    name: Lint (apps/web only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
        continue-on-error: true  # Lint warnings shouldn't block; gate on errors only

  db-tests:
    name: DB tests (Postgres + pgvector)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: bts
          POSTGRES_PASSWORD: bts
          POSTGRES_DB: bts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bts -d bts_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run vitest suite
        env:
          DATABASE_URL: postgres://bts:bts@localhost:5432/bts_test
          TEST_DATABASE_URL: postgres://bts:bts@localhost:5432/bts_test
        run: pnpm --filter @bts/db test

  # The standalone build job was removed: it required a stub DATABASE_URL
  # because Next.js 14 fails the build when generateStaticParams throws,
  # which meant we had `continue-on-error: true` masking real lint/Hook-rule
  # errors. The `e2e` job below now does a real production build against the
  # seeded service-container DB, which validates the same compile path AND
  # exercises generateStaticParams properly. One build job, no masking.

  e2e:
    name: E2E smokes (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: bts
          POSTGRES_PASSWORD: bts
          POSTGRES_DB: bts_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bts -d bts_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      # Migrate + seed against the bts_dev service container so the dev server
      # has the data the smoke spec asserts on (e.g. Top Gun: Maverick page).
      - name: Migrate + seed
        env:
          DATABASE_URL: postgres://bts:bts@localhost:5432/bts_dev
        run: |
          pnpm --filter @bts/db migrate
          pnpm --filter @bts/db seed

      - name: Install Playwright chromium
        run: pnpm --filter @bts/web exec playwright install --with-deps chromium

      # Production build instead of `next dev`: dev mode lazy-compiles each
      # route on first hit (5-30s per route in CI), which races Playwright's
      # 5s default timeout. `next build` pre-renders every page via
      # generateStaticParams against the seeded DB; `next start` then serves
      # them instantly.
      - name: Build for production
        env:
          DATABASE_URL: postgres://bts:bts@localhost:5432/bts_dev
          # Next.js spawns multiple workers for static generation. With our
          # default POOL_MAX=10, several workers easily exhaust Postgres's
          # 100-connection ceiling on the service container. POOL_MAX=2
          # keeps every worker's pool small; build still parallelises
          # over workers, but each one holds at most 2 DB connections.
          DATABASE_POOL_MAX: '2'
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: pnpm --filter @bts/web build

      - name: Start production server
        env:
          DATABASE_URL: postgres://bts:bts@localhost:5432/bts_dev
          DATABASE_POOL_MAX: '4'
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: |
          pnpm --filter @bts/web start > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          # next start is fast (~1-3s) but allow margin for module-load.
          for i in $(seq 1 30); do
            if curl -sSf -o /dev/null http://localhost:3000/; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start within 30s. Log:"
          cat /tmp/server.log
          exit 1

      - name: Run smoke pack
        env:
          E2E_BASE_URL: http://localhost:3000
        run: pnpm --filter @bts/web e2e

      - name: Stop production server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill "$(cat /tmp/server.pid)" || true
          fi

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            apps/web/test-results
            apps/web/playwright-report
          retention-days: 7
