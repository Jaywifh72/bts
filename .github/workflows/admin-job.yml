name: Admin job dispatch

# Triggered by the /admin/ingest UI on cinecanon.com. The Next.js
# server inserts a queued row into job_runs, then calls the GitHub
# Actions REST API to dispatch this workflow. The worker script reads
# the queued row, executes the command stored on it, streams stdout
# into job_runs.log_text, and finalises the row.
#
# Required secrets:
#   DATABASE_URL                Neon pooled URL (already used by
#                               scraper-weekly + ci).
#   TMDB_READ_ACCESS_TOKEN      For TMDb-based jobs.
#   YOUTUBE_API_KEY             (optional) for video discovery.
#   VIMEO_ACCESS_TOKEN          (optional) for Vimeo BTS sourcing.
#
# Run-id correlation: the dispatching server passes the job_runs row id
# as the `run_id` input. The worker reads it via $RUN_ID.

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'job_runs.id for this invocation'
        required: true
        type: string
      job_label:
        description: 'Human label (informational only — for the GHA UI)'
        required: false
        type: string
        default: ''

# Don't queue >1 run at a time per run_id. Different jobs can run in
# parallel (different run_ids = different concurrency groups).
concurrency:
  group: admin-job-${{ inputs.run_id }}
  cancel-in-progress: false

jobs:
  run:
    name: ${{ inputs.job_label || format('run_id={0}', inputs.run_id) }}
    runs-on: ubuntu-latest
    # Most jobs are sub-15-minute; some "long" tier jobs (embed:visual,
    # backfill:claims) can be 60+. Cap at 90 to avoid runaway.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run job
        env:
          RUN_ID: ${{ inputs.run_id }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_READ_ACCESS_TOKEN: ${{ secrets.TMDB_READ_ACCESS_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          VIMEO_ACCESS_TOKEN: ${{ secrets.VIMEO_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pnpm --filter @bts/db exec tsx scripts/run-admin-job.ts
