name: DB script (Neon prod)

# Run any packages/db/scripts/*.ts file against prod. Mirrors
# scraper-job.yml but targets the db package's script tier.
#
# Examples:
#   gh workflow run db-script.yml -f script=audit-composer-slugs
#   gh workflow run db-script.yml -f script=seed-scoring-stages-and-scores

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Script filename (without .ts extension)'
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @bts/db exec tsx scripts/${{ inputs.script }}.ts
