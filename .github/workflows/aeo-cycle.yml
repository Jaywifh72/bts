name: AEO cycle (daily)

# Runs the CineCanon-Sentinel daily AEO cycle against Neon prod.
# Deterministic polling — no LLM orchestration loop, so cost + runtime are
# predictable (~$2–4, ~10–25 min per cycle at 30 prompts × 3 engines × 3 samples).
#
# Schedule: 10:00 UTC = 06:00 ET (matches the skill's design).
#
# Required secrets:
#   DATABASE_URL          — Neon pooler URL (already set, used by migrate.yml)
#   OPENAI_API_KEY        — already set
#   ANTHROPIC_API_KEY     — set
#   GOOGLE_AI_API_KEY     — set (free-tier quota may 429; throttle handles it)
#   FIRECRAWL_API_KEY     — set (covers the 'ai_overview' engine slot)
#
# Missing engine keys cause the cycle to skip that engine (no failure).
# Cycle status:
#   succeeded — all calls ok
#   partial   — < 25% calls failed
#   failed    — >= 25% calls failed (exits 1, job marked failed)

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      samples_per_prompt:
        description: 'Samples per (prompt × engine) — default 2'
        required: false
        default: '2'
      dry_run:
        description: 'Dry-run (count only, no API calls or writes)'
        required: false
        type: boolean
        default: false

# Prevent overlapping runs. If a manual dispatch fires while a scheduled run
# is mid-flight, queue it rather than running both — they'd race each other
# against the same engine quotas.
concurrency:
  group: aeo-cycle
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    # Bumped from 45 → 90 after 4 consecutive scheduled cancellations
    # (issue #24). With 4 engines + 6s Gemini throttle + 429 retries,
    # samples=2 cycles routinely complete in 25-50 min. 90 min provides
    # headroom without leaving stuck runs sitting forever.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run AEO cycle
        working-directory: packages/db
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          AEO_SAMPLES_PER_PROMPT: ${{ inputs.samples_per_prompt || '2' }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: pnpm exec tsx scripts/aeo-cycle.ts

      - name: Upload digest
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: aeo-digest
          path: packages/db/output/aeo-digest-*.md
          if-no-files-found: ignore
          retention-days: 90
