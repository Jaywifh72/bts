name: Seed AEO sample claims (Neon prod)

# Manual workflow to seed the initial editorial claims so ClaimReview
# JSON-LD starts emitting on film pages. Idempotent — the seed script
# upserts on slug, so re-running it is safe.

on:
  workflow_dispatch: {}

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Seed AEO sample claims
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @bts/db exec tsx scripts/seed-aeo-sample-claims.ts
